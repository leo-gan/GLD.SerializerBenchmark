name: publish-docs
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'c-sharp/docs/**'
      - 'python/docs/**'
      - 'analysis/docs/**'
      - 'mkdocs.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
            
      - run: pip install mkdocs-material
      
      - name: Stitch documentation structure
        run: |
          # Copy language-specific docs into the root docs/ folder to satisfy MkDocs
          mkdir -p docs/c-sharp docs/python docs/analysis
          cp -r c-sharp/docs/* docs/c-sharp/ 2>/dev/null || true
          cp -r python/docs/* docs/python/ 2>/dev/null || true
          cp -r analysis/docs/* docs/analysis/ 2>/dev/null || true

      - run: mkdocs gh-deploy --force
